name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: corepack enable && pnpm install --frozen-lockfile
      - run: node --check index.js
      - run: node --check api/userRouter.js
      - run: node --check api/middleware.js
      - run: node --check api/errorHandler.js
      - run: node --check service/userService.js
      - run: node --check config/index.js
